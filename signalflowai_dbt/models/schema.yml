version: 2

models:
  - name: clean_reviews
    columns:
      - name: asin
        tests:
          - not_null

      - name: category
        tests:
          - not_null

      - name: ingest_dt
        tests:
          - not_null

      - name: review_text_clean
        tests:
          - not_null

      - name: review_length
        tests:
          - not_null

      - name: review_date
        tests:
          - not_null

      - name: positive_flag
        tests:
          - not_null

      - name: neutral_flag
        tests:
          - not_null

      - name: negative_flag
        tests:
          - not_null

      - name: complaint_type_candidate
        tests:
          - not_null

      - name: is_low_rating_review
        tests:
          - not_null

  - name: clean_meta
    columns:
      - name: asin
        tests:
          - not_null
          - unique

      - name: category
        tests:
          - not_null

      - name: ingest_dt
        tests:
          - not_null

  - name: review_enriched
    columns:
      - name: asin
        tests:
          - not_null

      - name: category
        tests:
          - not_null

      - name: review_text_clean
        tests:
          - not_null

      - name: review_date
        tests:
          - not_null

      - name: complaint_type_candidate
        tests:
          - not_null

  - name: product_health_daily
    columns:
      - name: asin
        tests:
          - not_null

      - name: review_date
        tests:
          - not_null

      - name: category
        tests:
          - not_null

      - name: complaint_type_candidate
        tests:
          - not_null

  - name: review_enriched_complaints
    columns:
      - name: asin
        tests:
          - not_null

      - name: category
        tests:
          - not_null

      - name: review_text_clean
        tests:
          - not_null

      - name: review_date
        tests:
          - not_null

      - name: complaint_type_candidate
        tests:
          - not_null

      - name: signal_score
        tests:
          - not_null

  - name: review_documents
    columns:
      - name: document_id
        tests:
          - not_null
          - unique

      - name: asin
        tests:
          - not_null

      - name: title

      - name: brand

      - name: category
        tests:
          - not_null

      - name: complaint_type
        tests:
          - not_null
          - accepted_values:
              values:
                - damage_defect
                - missing_parts
                - delivery_issue
                - quality_issue
                - wrong_item

      - name: review_date
        tests:
          - not_null

      - name: rating

      - name: review_text_clean
        tests:
          - not_null

      - name: retrieval_text
        tests:
          - not_null

      - name: signal_score
        tests:
          - not_null